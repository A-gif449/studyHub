<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<title>Messages – StudyHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0E0F12;--bg2:#13141A;--bg3:#181A21;--card:#15161C;--card2:#1B1D25;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --accent:#5B7FFF;--accent2:#8FA3D6;--accent3:#3FA9CC;
  --gold:#C9A356;--green:#4E9E78;--red:#C2564F;
  --text:#ECEDF1;--text2:#9498A6;--text3:#62656F;
  --r:10px;--r2:14px;--r3:18px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:56px;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(14,15,18,0.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.nav-logo{display:flex;align-items:center;gap:9px;font-family:'Source Serif 4',serif;font-size:17px;font-weight:700;color:var(--text);text-decoration:none;letter-spacing:.2px}
.nav-logo img{width:26px;height:26px;border-radius:7px;object-fit:cover}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-btn{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-user-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}

/* ── MAIN LAYOUT ── */
.app{
  position:fixed;top:56px;bottom:0;left:0;right:0;
  display:flex;
}

/* ── SIDEBAR ── */
.sidebar{
  width:300px;flex-shrink:0;
  border-right:1px solid var(--border);
  background:var(--bg);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:transform .25s ease;
}
.sidebar-head{
  padding:16px 16px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sidebar-head h2{font-family:'Source Serif 4',serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px;letter-spacing:-.2px}
.search-box{position:relative}
.search-box i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.search-box input{width:100%;padding:9px 12px 9px 34px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12.5px;font-family:inherit;outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text3)}

.conv-list{flex:1;overflow-y:auto;padding:6px}
.conv-item{
  display:flex;align-items:center;gap:11px;
  padding:11px 11px;border-radius:9px;
  cursor:pointer;transition:background .15s;
  position:relative;margin-bottom:1px;
}
.conv-item:hover{background:var(--bg3)}
.conv-item.active{background:rgba(91,127,255,0.1);border:1px solid rgba(91,127,255,0.18)}
.conv-item.active:hover{background:rgba(91,127,255,0.14)}
.conv-av{position:relative;flex-shrink:0}
.conv-av-inner{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Source Serif 4',serif;font-size:15px;font-weight:700;color:#fff;
}
.online-ring{position:absolute;inset:-2px;border-radius:14px;border:2px solid var(--bg);pointer-events:none}
.online-dot{
  position:absolute;bottom:-1px;right:-1px;
  width:11px;height:11px;border-radius:50%;
  border:2px solid var(--bg);
  background:var(--text3);
  transition:background .3s;
}
.online-dot.online{background:var(--green)}
.online-dot.away{background:var(--gold)}
.conv-body{flex:1;min-width:0}
.conv-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:11.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview.unread{color:var(--text2);font-weight:500}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.conv-time{font-size:10.5px;color:var(--text3)}
.unread-badge{min-width:18px;height:18px;padding:0 5px;border-radius:99px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}

.sidebar-empty{padding:40px 20px;text-align:center;color:var(--text3)}
.sidebar-empty i{font-size:32px;margin-bottom:10px;display:block;opacity:.4}
.sidebar-empty p{font-size:12.5px;line-height:1.6}

/* ── CHAT PANEL ── */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Header */
.chat-head{
  flex-shrink:0;padding:0 20px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:rgba(14,15,18,0.9);backdrop-filter:blur(10px);
}
.chat-head-left{display:flex;align-items:center;gap:12px}
.chat-head-av{position:relative;flex-shrink:0}
.chat-head-av-inner{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Source Serif 4',serif;font-size:13px;font-weight:700;color:#fff}
.chat-head-dot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);background:var(--text3);transition:background .3s}
.chat-head-dot.online{background:var(--green)}
.chat-head-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.chat-head-status{font-size:11.5px;color:var(--text3);display:flex;align-items:center;gap:5px}
.chat-head-status .pulse{width:6px;height:6px;border-radius:50%;background:var(--green);display:none;animation:pulse-dot 2s ease infinite}
.chat-head-status .pulse.show{display:inline-block}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.chat-head-actions{display:flex;gap:6px}
.head-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;text-decoration:none}
.head-btn:hover{color:var(--text);background:rgba(255,255,255,0.04)}

/* Messages area */
.msgs-area{
  flex:1;overflow-y:auto;
  padding:20px 20px 8px;
  display:flex;flex-direction:column;
  gap:2px;
  scroll-behavior:smooth;
}

/* Day separator */
.day-sep{
  text-align:center;margin:14px 0 10px;
  font-size:11px;color:var(--text3);
  display:flex;align-items:center;gap:10px;
}
.day-sep::before,.day-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* Message bubbles */
.msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:2px}
.msg-row.own{flex-direction:row-reverse}
.msg-av{
  width:26px;height:26px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Source Serif 4',serif;font-size:9px;font-weight:700;color:#fff;
  flex-shrink:0;align-self:flex-end;
}
.msg-av.hidden{opacity:0;pointer-events:none}
.msg-col{display:flex;flex-direction:column;gap:2px;max-width:68%}
.msg-row.own .msg-col{align-items:flex-end}

.sender-name{font-size:10.5px;color:var(--text3);padding:0 4px;margin-bottom:1px}

.bubble{
  padding:9px 13px;border-radius:13px;
  font-size:13.5px;line-height:1.55;
  word-break:break-word;
  position:relative;
}
.bubble.theirs{
  background:var(--card2);border:1px solid var(--border2);
  color:var(--text);border-bottom-left-radius:4px;
}
.bubble.own{
  background:var(--accent);
  color:#fff;border-bottom-right-radius:4px;
}
.bubble-time{font-size:10px;color:var(--text3);padding:0 4px;margin-top:1px}
.msg-row.own .bubble-time{text-align:right}

/* Read receipt */
.read-tick{font-size:10px;color:rgba(255,255,255,.55);margin-left:4px}
.read-tick.seen{color:rgba(255,255,255,.9)}

/* Typing indicator */
.typing-row{display:flex;align-items:center;gap:8px;padding:4px 0 0;min-height:28px}
.typing-av{width:26px;height:26px;border-radius:8px;flex-shrink:0}
.typing-bubble{
  padding:10px 14px;border-radius:13px;border-bottom-left-radius:4px;
  background:var(--card2);border:1px solid var(--border2);
  display:flex;gap:4px;align-items:center;
}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:typingBounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Input area */
.input-wrap{
  flex-shrink:0;padding:12px 16px;
  border-top:1px solid var(--border);
  background:rgba(14,15,18,0.95);
}
.input-box{
  display:flex;align-items:flex-end;gap:10px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:12px;padding:10px 12px 10px 14px;
  transition:border-color .15s;
}
.input-box:focus-within{border-color:rgba(91,127,255,0.5)}
.msg-textarea{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:inherit;font-size:13.5px;
  line-height:1.5;resize:none;max-height:120px;min-height:22px;
}
.msg-textarea::placeholder{color:var(--text3)}
.send-btn{
  width:34px;height:34px;border-radius:9px;
  background:var(--accent);border:none;
  color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;
}
.send-btn:hover{background:#4D6FE0}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.char-hint{font-size:10.5px;color:var(--text3);text-align:right;margin-top:5px}

/* ── NO CHAT SELECTED ── */
.no-chat{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--text3);gap:14px;padding:40px;
}
.no-chat-icon{
  width:72px;height:72px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;color:var(--text3);margin-bottom:4px;
}
.no-chat h3{font-family:'Source Serif 4',serif;font-size:19px;font-weight:700;color:var(--text2)}
.no-chat p{font-size:13px;line-height:1.65;text-align:center;max-width:300px}
.no-chat-btn{margin-top:6px;padding:10px 22px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.no-chat-btn:hover{background:#4D6FE0}

/* ── GATE ── */
.gate-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:200;padding:24px}
.gate-card{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r3);padding:40px;max-width:400px;width:100%;text-align:center}
.gate-card i{font-size:38px;color:var(--accent2);margin-bottom:16px;display:block}
.gate-card h2{font-family:'Source Serif 4',serif;font-size:21px;font-weight:700;margin-bottom:8px}
.gate-card p{font-size:13.5px;color:var(--text2);margin-bottom:22px;line-height:1.65}
.gate-btns{display:flex;gap:10px;justify-content:center}
.btn-primary{padding:10px 24px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;display:inline-flex;align-items:center;gap:7px;text-decoration:none}
.btn-primary:hover{background:#4D6FE0}
.btn-ghost{padding:9px 20px;border-radius:8px;border:1px solid var(--border2);color:var(--text2);background:transparent;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,0.04)}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;z-index:999;padding:12px 17px;border-radius:9px;background:var(--card2);border:1px solid var(--border2);font-size:13px;color:var(--text);box-shadow:0 12px 32px rgba(0,0,0,.45);transform:translateY(20px);opacity:0;transition:all .25s;display:flex;align-items:center;gap:9px;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:rgba(78,158,120,.3)}
.toast.error{border-color:rgba(194,86,79,.3)}

/* ── MOBILE ── */
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}

@media(max-width:680px){
  .sidebar{position:absolute;inset:0;width:100%;z-index:10;transform:translateX(0)}
  .sidebar.hidden{transform:translateX(-100%)}
  .chat-panel{position:absolute;inset:0}
  .chat-panel.hidden{display:none}
  .back-to-list{display:flex!important}
}
.back-to-list{display:none;align-items:center;gap:6px;padding:6px 10px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<!-- GATE -->
<div class="gate-screen" id="gateScreen" style="display:none">
  <div class="gate-card">
    <i class="ti ti-message-circle-2"></i>
    <h2>Sign in to Message</h2>

<!-- APP -->

      <h2>Messages</h2>
      <div class="search-box">
        <i class="ti ti-search"></i>

  <!-- CHAT PANEL -->

  </div>
</div>

<!-- TOAST -->

<script>
firebase.initializeApp(window.FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

/* ── state ── */
let me = null;                  // current user object
let activeConvId  = null;       // currently open conversation id
let activeOther   = null;       // { uid, name, email }
let msgsUnsub     = null;       // unsubscribe fn for messages listener
let presenceUnsub = null;       // unsubscribe fn for other user's presence
let convUnsub     = null;       // unsubscribe fn for conversations list
let typingTimeout = null;
let isTyping      = false;
let allConvs      = [];         // raw list for filtering

/* ─────────────── HELPERS ─────────────── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(name){ return String(name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function avatarColor(uid){
  const colors=['#5B7FFF','#3FA9CC','#4E9E78','#8FA3D6','#C9A356','#C2564F'];
  let h=0; for(let c of (uid||'x')) h=(h<<5)-h+c.charCodeAt(0);
  return colors[Math.abs(h)%colors.length];
}
function convId(a,b){ return [a,b].sort().join('_'); }
function timeStr(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const diff = now - d;
  if(diff < 60000) return 'just now';
  if(diff < 3600000) return Math.floor(diff/60000)+'m ago';
  if(diff < 86400000) return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  if(diff < 604800000) return d.toLocaleDateString('en-US',{weekday:'short'});
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function dayLabel(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const msgDay = new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff = (today - msgDay) / 86400000;
  if(diff === 0) return 'Today';
  if(diff === 1) return 'Yesterday';
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
function lastSeenStr(ts){
  if(!ts) return 'Offline';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Date.now() - d.getTime();
  if(diff < 120000) return 'Active now';
  if(diff < 3600000) return 'Active '+Math.floor(diff/60000)+'m ago';
  if(diff < 86400000) return 'Active '+Math.floor(diff/3600000)+'h ago';
  return 'Last seen '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastIcon').className=type==='success'?'ti ti-check':'ti ti-alert-circle';
  t.className=`toast ${type} show`;
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),3000);
}
function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

/* ─────────────── AUTH ─────────────── */
auth.onAuthStateChanged(user => {
  me = user;
  if(!user){
    document.getElementById('gateScreen').style.display='flex';
    document.getElementById('mainNav').style.display='none';
    document.getElementById('mainApp').style.display='none';
    return;
  }
  document.getElementById('gateScreen').style.display='none';
  document.getElementById('mainNav').style.display='flex';
  document.getElementById('mainApp').style.display='flex';

  // nav avatar
  const av = document.getElementById('navAv');
  av.textContent = initials(user.displayName||user.email);
  av.style.background = avatarColor(user.uid);

  // set my own presence
  setMyPresence();

  // load conversations list
  loadConvList();

  // check if URL has ?uid= to auto-open a conversation
  const urlUid = new URLSearchParams(location.search).get('uid');
  const urlName = new URLSearchParams(location.search).get('name') || 'User';
  const urlEmail = new URLSearchParams(location.search).get('email') || '';
  if(urlUid && urlUid !== user.uid){
    openConv(urlUid, decodeURIComponent(urlName), decodeURIComponent(urlEmail));
  }
});

/* ─────────────── PRESENCE ─────────────── */
function setMyPresence(){
  if(!me) return;
  const ref = db.collection('presence').doc(me.uid);
  const data = {
    uid: me.uid,
    name: me.displayName || me.email,
    online: true,
    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
  };
  ref.set(data, {merge:true});

  // heartbeat every 30s
  const hb = setInterval(()=>{
    if(!me) { clearInterval(hb); return; }
    ref.update({ online:true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});
  }, 30000);

  // go offline on unload
  window.addEventListener('beforeunload', ()=>{
    ref.update({ online:false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});
  });

  // page visibility
  document.addEventListener('visibilitychange', ()=>{
    if(!me) return;
    ref.update({
      online: !document.hidden,
      lastSeen: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(()=>{});
  });
}

function watchPresence(uid, onUpdate){
  if(presenceUnsub) presenceUnsub();
  presenceUnsub = db.collection('presence').doc(uid).onSnapshot(snap => {
    if(!snap.exists){ onUpdate({online:false, lastSeen:null}); return; }
    onUpdate(snap.data());
  });
}

/* ─────────────── CONVERSATIONS LIST ─────────────── */
function loadConvList(){
  if(convUnsub) convUnsub();
  convUnsub = db.collection('conversations')
    .where('members','array-contains', me.uid)
    .orderBy('lastMsgAt','desc')
    .onSnapshot(snap => {
      allConvs = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderConvList(allConvs);
    }, err => {
      // index might not be created yet — show friendly msg
      document.getElementById('convList').innerHTML = `
        <div class="sidebar-empty">
          <i class="ti ti-alert-circle"></i>
          <p>Conversations need a Firestore index.<br/>
          Open the console error for the link to create it.</p>
        </div>`;
      console.error('[Messages] Firestore index needed:', err.message);
    });
}

function renderConvList(convs){
  const list = document.getElementById('convList');
  if(!convs.length){
    list.innerHTML = `<div class="sidebar-empty"><i class="ti ti-message-off"></i><p>No conversations yet.<br/><a href="friends.html" style="color:var(--accent2)">Find friends</a> to start chatting.</p></div>`;
    return;
  }
  list.innerHTML = convs.map(conv => {
    const otherId = conv.members.find(m => m !== me.uid);
    const otherName = conv.names?.[otherId] || 'Unknown';
    const color = avatarColor(otherId);
    const unread = (conv.unread?.[me.uid] || 0);
    const preview = conv.lastMsg || 'Start the conversation…';
    const isActive = conv.id === activeConvId;
    return `
      <div class="conv-item ${isActive?'active':''}" id="conv-${conv.id}"
           onclick="openConvFromList('${conv.id}','${esc(otherId)}','${esc(otherName)}','${esc(conv.emails?.[otherId]||'')}')">
        <div class="conv-av">
          <div class="conv-av-inner" style="background:${color}">${initials(otherName)}</div>
          <div class="online-dot" id="dot-${otherId}"></div>
        </div>
        <div class="conv-body">
          <div class="conv-name">${esc(otherName)}</div>
          <div class="conv-preview ${unread?'unread':''}">${esc(preview.slice(0,50))}${preview.length>50?'…':''}</div>
        </div>
        <div class="conv-meta">
          <div class="conv-time">${timeStr(conv.lastMsgAt)}</div>
          ${unread ? `<div class="unread-badge">${unread>99?'99+':unread}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  // track presence for each other user
  const otherIds = [...new Set(convs.map(c => c.members.find(m=>m!==me.uid)).filter(Boolean))];
  otherIds.forEach(uid => watchPresenceDot(uid));
}

function filterConvs(){
  const q = document.getElementById('convSearch').value.toLowerCase().trim();
  if(!q){ renderConvList(allConvs); return; }
  renderConvList(allConvs.filter(c => {
    const otherId = c.members.find(m=>m!==me.uid);
    const name = (c.names?.[otherId]||'').toLowerCase();
    return name.includes(q) || (c.lastMsg||'').toLowerCase().includes(q);
  }));
}

/* small presence dot in sidebar */
function watchPresenceDot(uid){
  db.collection('presence').doc(uid).onSnapshot(snap => {
    const dot = document.getElementById('dot-'+uid);
    if(!dot) return;
    if(!snap.exists){ dot.className='online-dot'; return; }
    const data = snap.data();
    const isOnline = data.online && (Date.now() - (data.lastSeen?.toDate?.()?.getTime()||0)) < 90000;
    dot.className = 'online-dot' + (isOnline ? ' online' : '');
  });
}

/* ─────────────── OPEN CONVERSATION ─────────────── */
function openConvFromList(cid, uid, name, email){
  activeConvId = cid;
  activeOther  = {uid, name, email};
  showActiveChat();
  subscribeMessages(cid);
  markRead(cid);
  watchOtherPresence(uid, name);
  // highlight sidebar item
  document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('conv-'+cid)?.classList.add('active');
}

async function openConv(uid, name, email){
  // create or get existing conversation doc
  const cid = convId(me.uid, uid);
  activeConvId = cid;
  activeOther  = {uid, name, email};

  // ensure conv doc exists
  const ref = db.collection('conversations').doc(cid);
  const snap = await ref.get();
  if(!snap.exists){
    await ref.set({
      members: [me.uid, uid].sort(),
      names: {
        [me.uid]: me.displayName || me.email,
        [uid]: name
      },
      emails: {
        [me.uid]: me.email,
        [uid]: email
      },
      lastMsg: '',
      lastMsgAt: firebase.firestore.FieldValue.serverTimestamp(),
      unread: {}
    });
  }

  showActiveChat();
  subscribeMessages(cid);
  markRead(cid);
  watchOtherPresence(uid, name);
  // update URL without reload
  history.replaceState(null,'',`?uid=${uid}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`);
}

function showActiveChat(){
  document.getElementById('noChat').style.display='none';
  const ac = document.getElementById('activeChat');
  ac.style.display='flex';
  ac.style.flexDirection='column';

  // set head info
  document.getElementById('chatHeadName').textContent = activeOther.name;
  document.getElementById('chatHeadAv').textContent = initials(activeOther.name);
  document.getElementById('chatHeadAv').style.background = avatarColor(activeOther.uid);
  document.getElementById('viewProfileBtn').href = `profile.html?uid=${activeOther.uid}`;

  // mobile: hide sidebar
  document.getElementById('sidebar').classList.add('hidden');

  document.getElementById('msgInput').focus();
}

/* ─────────────── PRESENCE HEADER ─────────────── */
function watchOtherPresence(uid, name){
  watchPresence(uid, data => {
    const dot   = document.getElementById('chatHeadDot');
    const pulse = document.getElementById('onlinePulse');
    const stTxt = document.getElementById('statusText');

    if(!data){ dot.className='chat-head-dot'; pulse.classList.remove('show'); stTxt.textContent='Offline'; return; }

    const lastSeen = data.lastSeen?.toDate?.() || null;
    const isOnline = data.online && lastSeen && (Date.now()-lastSeen.getTime()) < 90000;

    dot.className = 'chat-head-dot' + (isOnline ? ' online' : '');
    pulse.classList.toggle('show', isOnline);
    stTxt.textContent = isOnline ? 'Active now' : lastSeenStr(data.lastSeen);
  });
}

/* ─────────────── MESSAGES ─────────────── */
function subscribeMessages(cid){
  if(msgsUnsub) msgsUnsub();
  const area = document.getElementById('msgsArea');
  area.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text3)"><i class="ti ti-loader spin" style="font-size:24px"></i></div>`;

  msgsUnsub = db.collection('conversations').doc(cid)
    .collection('messages')
    .orderBy('createdAt','asc')
    .limitToLast(100)
    .onSnapshot(snap => {
      renderMessages(snap.docs.map(d=>({id:d.id,...d.data()})));
    }, err => {
      area.innerHTML = `<div style="text-align:center;padding:30px;color:var(--red)">Error: ${esc(err.message)}</div>`;
    });

  // typing listener
  watchTyping(cid);
}

function renderMessages(msgs){
  const area = document.getElementById('msgsArea');
  const wasAtBottom = area.scrollHeight - area.clientHeight - area.scrollTop < 60;

  if(!msgs.length){
    area.innerHTML = `
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px;padding:40px">
        <i class="ti ti-messages" style="font-size:36px;opacity:.3"></i>
        <p style="font-size:13px;text-align:center">No messages yet.<br/>Say hello! 👋</p>
      </div>`;
    return;
  }

  let html = '';
  let prevDay = '';
  let prevSender = '';

  msgs.forEach((msg, i) => {
    const ts = msg.createdAt?.toDate?.() || new Date();
    const day = dayLabel(msg.createdAt);
    const isOwn = msg.senderId === me.uid;
    const sameUser = prevSender === msg.senderId;

    if(day !== prevDay){
      html += `<div class="day-sep">${day}</div>`;
      prevDay = day;
      prevSender = '';
    }

    const showAvatar = !sameUser && !isOwn;
    const color = avatarColor(msg.senderId);
    const init  = initials(msg.senderName || '?');
    const timeLabel = ts.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

    // read receipt for own messages
    const isLast = i === msgs.length - 1;
    const readTick = (isOwn && isLast) ? `<span class="read-tick ${msg.read?'seen':''}">✓✓</span>` : '';

    html += `
      <div class="msg-row ${isOwn?'own':''}">
        <div class="msg-av ${showAvatar?'':'hidden'}" style="background:${color}">${init}</div>
        <div class="msg-col">
          ${showAvatar ? `<div class="sender-name">${esc(msg.senderName||'')}</div>` : ''}
          <div class="bubble ${isOwn?'own':'theirs'}">${esc(msg.text)}${readTick}</div>
          <div class="bubble-time">${timeLabel}</div>
        </div>
      </div>`;

    prevSender = msg.senderId;
  });

  area.innerHTML = html;
  if(wasAtBottom || msgs.length <= 20){
    area.scrollTop = area.scrollHeight;
  }
}

/* ─────────────── SEND ─────────────── */
async function sendMsg(){
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if(!text || !activeConvId || !me) return;

  input.value='';
  input.style.height='auto';
  document.getElementById('charCount').textContent='0';
  document.getElementById('sendBtn').disabled=true;
  stopTyping();

  const cid = activeConvId;
  const otherId = activeOther.uid;

  try {
    const msgRef = db.collection('conversations').doc(cid).collection('messages');
    await msgRef.add({
      text,
      senderId: me.uid,
      senderName: me.displayName || me.email,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      read: false
    });

    // update conversation doc
    await db.collection('conversations').doc(cid).update({
      lastMsg: text,
      lastMsgAt: firebase.firestore.FieldValue.serverTimestamp(),
      [`unread.${otherId}`]: firebase.firestore.FieldValue.increment(1),
      [`names.${me.uid}`]: me.displayName || me.email,
      [`names.${otherId}`]: activeOther.name,
      [`emails.${me.uid}`]: me.email,
      [`emails.${otherId}`]: activeOther.email || '',
      members: [me.uid, otherId].sort(),
    });
  } catch(e){
    showToast('Failed to send: '+e.message,'error');
  }
}

/* ─────────────── MARK READ ─────────────── */
async function markRead(cid){
  if(!me) return;
  try {
    await db.collection('conversations').doc(cid).update({
      [`unread.${me.uid}`]: 0
    });
    // mark last few messages as read
    const snap = await db.collection('conversations').doc(cid)
      .collection('messages').orderBy('createdAt','desc').limit(20).get();
    const batch = db.batch();
    snap.docs.forEach(d => {
      if(d.data().senderId !== me.uid && !d.data().read){
        batch.update(d.ref, {read:true});
      }
    });
    await batch.commit();
  } catch(e){ /* silent */ }
}

/* ─────────────── TYPING ─────────────── */
function handleInput(el){
  autoResize(el);
  document.getElementById('charCount').textContent = el.value.length;
  document.getElementById('sendBtn').disabled = !el.value.trim();
  if(!me || !activeConvId) return;
  if(!isTyping){
    isTyping = true;
    db.collection('typing').doc(activeConvId+'_'+me.uid).set({
      uid: me.uid,
      name: me.displayName || me.email,
      convId: activeConvId,
      at: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(()=>{});
  }
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(stopTyping, 2500);
}

function stopTyping(){
  if(!me || !activeConvId) return;
  isTyping = false;
  db.collection('typing').doc(activeConvId+'_'+me.uid).delete().catch(()=>{});
}

let typingWatchInt = null;
function watchTyping(cid){
  if(typingWatchInt) clearInterval(typingWatchInt);
  typingWatchInt = setInterval(async () => {
    if(!me) return;
    try {
      const cutoff = new Date(Date.now()-4000);
      const snap = await db.collection('typing')
        .where('convId','==',cid)
        .where('at','>=',firebase.firestore.Timestamp.fromDate(cutoff)).get();
      const others = snap.docs.filter(d=>d.data().uid!==me.uid);
      const row = document.getElementById('typingRow');
      if(others.length){
        row.style.display='flex';
      } else {
        row.style.display='none';
      }
    } catch(e){}
  }, 1200);
}

function handleKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
}

/* ─────────────── MOBILE BACK ─────────────── */
function goBackToList(){
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('noChat').style.display='flex';
  document.getElementById('activeChat').style.display='none';
  if(msgsUnsub){ msgsUnsub(); msgsUnsub=null; }
  if(presenceUnsub){ presenceUnsub(); presenceUnsub=null; }
  if(typingWatchInt){ clearInterval(typingWatchInt); typingWatchInt=null; }
  activeConvId=null; activeOther=null;
  history.replaceState(null,'','messages.html');
  stopTyping();
}

st.textContent='@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
document.head.appendChild(st);
