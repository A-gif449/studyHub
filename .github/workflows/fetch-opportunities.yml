name: Fetch job & exam opportunities

on:
  schedule:
    # Every 3 hours. GitHub's actual trigger time can drift a few minutes —
    # that's normal and fine for this use case.
    - cron: "0 */3 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/fetch-opportunities
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run fetch script
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node fetch.js
