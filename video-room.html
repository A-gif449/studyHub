<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0E0F12;--bg2:#13141A;--bg3:#181A21;--card:#15161C;--card2:#1B1D25;
    --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
    --accent:#5B7FFF;--accent2:#8FA3D6;
    --green:#4E9E78;--red:#C2564F;--gold:#C9A356;
    --text:#ECEDF1;--text2:#9498A6;--text3:#62656F;
    --r:10px;--r2:14px;--r3:18px;
  }
  html,body{height:100%;overflow:hidden}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}

  /* ── NAV ── */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 5%;background:rgba(14,15,18,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
  .nav-logo{display:flex;align-items:center;gap:10px;font-family:'Source Serif 4',serif;font-size:18px;font-weight:700;color:var(--text);text-decoration:none}
  .live-pill{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;background:rgba(78,228,160,0.08);border:1px solid rgba(78,228,160,0.2);font-size:11.5px;font-weight:600;color:#4EE4A0}
  .live-pill::before{content:'';width:5px;height:5px;border-radius:50%;background:#4EE4A0;animation:blink 1.8s ease infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .nav-right{display:flex;align-items:center;gap:8px}
  .user-av{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
  .btn-danger{padding:7px 14px;border-radius:var(--r);background:rgba(194,86,79,0.1);border:1px solid rgba(194,86,79,0.25);color:var(--red);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:none;align-items:center;gap:6px}
  .btn-danger:hover{background:rgba(194,86,79,0.18)}
  .btn-ghost{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);color:var(--text2);background:transparent;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
  .btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}

  /* ── PAGE ── */
  .page{position:fixed;top:56px;bottom:0;left:0;right:0;display:flex;flex-direction:column}

  /* ── LOBBY ── */
  .center-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
  .lobby-card{max-width:440px;width:100%;background:var(--card);border:1px solid var(--border2);border-radius:var(--r3);padding:40px;text-align:center;animation:fadeUp .3s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .room-emoji{font-size:48px;margin-bottom:18px;display:block}
  .lobby-card h2{font-family:'Source Serif 4',serif;font-size:22px;font-weight:700;margin-bottom:8px;color:var(--text)}
  .lobby-card p{font-size:13.5px;color:var(--text2);line-height:1.7;margin-bottom:22px}
  .tags{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:24px}
  .tag{padding:5px 12px;border-radius:99px;background:rgba(91,127,255,0.08);border:1px solid rgba(91,127,255,0.18);color:var(--accent2);font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px}
  .join-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 0 28px rgba(91,127,255,0.28)}
  .join-btn:hover{background:#4D6FE0}
  .join-btn:disabled{opacity:.55;cursor:not-allowed}
  .err{background:rgba(194,86,79,0.08);border:1px solid rgba(194,86,79,0.2);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none;align-items:center;gap:8px}
  .err.show{display:flex}
  .hint{margin-top:14px;font-size:12px;color:var(--text3);line-height:1.6}

  /* ── VIDEO FRAME ── */
  #videoWrap{display:none;flex:1;flex-direction:column}
  #dailyFrame{flex:1;border:none;background:#000;display:block}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:22px;right:22px;z-index:9999;padding:12px 18px;border-radius:var(--r);background:var(--card2);border:1px solid var(--border2);font-size:13px;color:var(--text);box-shadow:0 16px 40px rgba(0,0,0,0.45);transform:translateY(16px);opacity:0;transition:all .25s;display:flex;align-items:center;gap:10px;pointer-events:none}
  .toast.show{transform:none;opacity:1}
  .toast.success{border-color:rgba(78,158,120,.3)}
  .toast.error{border-color:rgba(194,86,79,.3)}

  @keyframes spin{to{transform:rotate(360deg)}}
</style>

const params=new URLSearchParams(location.search);
const roomKey=params.get('room')||'general';
const roomInfo=ROOMS[roomKey]||ROOMS.general;
const roomUrl=`https://${window.DAILY_DOMAIN}.daily.co/studyhub-${roomKey}`;

let currentUser=null,callInstance=null;

// Set lobby UI

document.getElementById('lobbyTitle').textContent=roomInfo.name+' Room';
document.getElementById('lobbyDesc').textContent=roomInfo.desc;

auth.onAuthStateChanged(user=>{
  if(!user){window.location.href='index.html';return;}
  currentUser=user;
  const initials=(user.displayName||user.email).split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('userAv').textContent=initials;
});

async function joinRoom(){
  joinedSuccessfully = false; 
  const btn = document.getElementById('joinBtn');
  const err = document.getElementById('errBanner');
  err.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Connecting…';

  try {
    // Step 1: create/verify room exists on Daily first
    const res = await fetch('/api/create-room', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomName: `studyhub-${roomKey}` }),
    });
    const data = await res.json();
    if (!data.url) throw new Error(data.error || 'Could not get room URL');

    // Step 2: join with the verified URL
    const isHost = window.ADMIN_EMAILS.includes(currentUser?.email);
    const token  = isHost ? OWNER_TOKENS[roomKey] : null;
    launchCall(data.url, token);

  } catch(e) {
    document.getElementById('errMsg').textContent = e.message || 'Could not connect.';
    err.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-video"></i> Try Again';
  }
}

let joinedSuccessfully = false;

function launchCall(url, token = null) {
  document.getElementById('lobbyScreen').style.display = 'none';
  const wrap = document.getElementById('videoWrap');
  wrap.style.display = 'flex';
  document.getElementById('leaveBtn').style.display = 'flex';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('navLivePill').style.display = 'flex';

  const container = document.getElementById('dailyFrame');
  const userName = (currentUser?.displayName || currentUser?.email?.split('@')[0] || 'Learner').trim();

  callInstance = window.DailyIframe ? DailyIframe.createFrame(container, {
    iframeStyle: { width:'100%', height:'100%', border:'none', background:'#0A0A10' },
    showLeaveButton: false, showFullscreenButton: true,
    theme: { colors: {
      accent:'#5B7FFF', accentText:'#FFFFFF',
      background:'#0E0F12', backgroundAccent:'#13141A',
      baseText:'#ECEDF1', border:'#2A2C35',
      mainAreaBg:'#0A0B0E', mainAreaBgAccent:'#13141A',
      mainAreaText:'#ECEDF1', supportiveText:'#9498A6',
    }}
  }) : null;

  if (callInstance) {
    const opts = { url, userName };
    if (token) opts.token = token;
    callInstance.join(opts);

    callInstance.on('joined-meeting', () => {
      joinedSuccessfully = true;
      showToast('Joined ' + roomInfo.name + ' room 🎥', 'success');
    });

    callInstance.on('left-meeting', () => {
      if (joinedSuccessfully) {
        joinedSuccessfully = false;
        leaveRoom();
      } else {
        // Never actually got in — show error, don't silently reset
        document.getElementById('videoWrap').style.display = 'none';
        document.getElementById('lobbyScreen').style.display = 'flex';
        document.getElementById('leaveBtn').style.display = 'none';
        document.getElementById('backBtn').style.display = 'inline-flex';
        document.getElementById('navLivePill').style.display = 'none';
        document.getElementById('errMsg').textContent = 'Could not join — please try again.';
        document.getElementById('errBanner').classList.add('show');
        const btn = document.getElementById('joinBtn');
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-video"></i> Try Again';
      }
    });

    callInstance.on('error', (e) => {
      console.error('[Daily error]', e);
    });

  } else {
    container.innerHTML = `<iframe src="${url}" allow="camera;microphone;fullscreen;display-capture" style="width:100%;height:100%;border:none;background:#000"></iframe>`;
    showToast('Joined ' + roomInfo.name + ' room 🎥', 'success');
  }
}

function leaveRoom(){
  if(callInstance){try{callInstance.leave();callInstance.destroy();}catch(e){}callInstance=null;}
  document.getElementById('videoWrap').style.display='none';
  document.getElementById('lobbyScreen').style.display='flex';
  document.getElementById('leaveBtn').style.display='none';
  document.getElementById('backBtn').style.display='inline-flex';
  document.getElementById('navLivePill').style.display='none';
  const btn=document.getElementById('joinBtn');
  btn.disabled=false;btn.innerHTML='<i class="ti ti-video"></i> Join Video Room';
  showToast('You left the room.','success');
}

function goBack(){window.location.href='index.html';}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastIcon').className=type==='success'?'ti ti-check':'ti ti-alert-circle';
  t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3500);
}
